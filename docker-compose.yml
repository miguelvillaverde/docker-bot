services:
  n8n:
    build: .
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=https://unusable-stole-unvalued.ngrok-free.dev
      - N8N_USER_FOLDER=/home/node/.n8n
      - NODE_FUNCTION_ALLOW_BUILTIN=child_process,fs,path
    volumes:
      - ./n8n-data:/home/node/.n8n
      - ./generated-webs:/home/node/.n8n/generated-webs
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  openhands:
    image: ghcr.io/all-hands-ai/openhands:0.28
    container_name: openhands
    ports:
      - "3000:3000"
    volumes:
      - ./openhands-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  webserver:
    image: nginx:latest
    container_name: webserver
    ports:
      - "8088:80"
    volumes:
      - ./generated-webs:/usr/share/nginx/html
    restart: unless-stopped

volumes:
  ollama:
